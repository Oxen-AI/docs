name: Regenerate model API reference docs

on:
  schedule:
    # 5pm Friday PST (01:00 UTC Saturday). GitHub cron is UTC and ignores DST.
    - cron: "0 1 * * 6"
  workflow_dispatch:
    inputs:
      models_url:
        description: "Models API URL the generator pulls from"
        required: false
        default: "https://hub.oxen.ai/api/evaluations/models"
      branch:
        description: "Branch to open the PR against"
        required: false
        default: "main"

env:
  MODELS_URL: ${{ inputs.models_url || 'https://hub.oxen.ai/api/evaluations/models' }}
  BASE_BRANCH: ${{ inputs.branch || 'main' }}

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install generator deps
        run: pip install requests

      - name: Clean stale generated pages
        # overview.mdx and walkthroughs/ are hand-written; only wipe the
        # per-model files the generator owns so deletions for removed models
        # show up as diffs in the PR.
        run: |
          find inference-api/reference/models \
            -maxdepth 1 -type f -name '*.mdx' ! -name 'overview.mdx' -delete

      - name: Regenerate
        run: python generate-model-docs.py --models-url "$MODELS_URL"

      - name: Open pull request if anything changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Regenerate model API reference docs"
          title: "Regenerate model API reference docs"
          body: |
            Auto-regenerated by the `Regenerate model API reference docs` workflow.

            Source: `${{ env.MODELS_URL }}`
          branch: regenerate-model-docs
          base: ${{ env.BASE_BRANCH }}
          reviewers: Eric-Laurence
          delete-branch: true
